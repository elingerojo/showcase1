<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Frontend</title>
  <base href="/">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" type="image/x-icon" href="favicon.ico">
    <style>
        :root {
            --primary-bg: #f8f9fa;
            --card-bg: #ffffff;
            --border-color: #e9ecef;
            --text-primary: #343a40;
            --text-secondary: #6c757d;
            --accent-color: #4f46e5;
            --accent-hover: #4338ca;
            --shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
        }

        body {
            background-color: var(--primary-bg);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        /* Contenedor principal de la página */
        .page-container {
            width: 100%;
            max-width: 1200px;
            height: 85vh;
            display: grid;
            grid-template-columns: 320px 1fr;
            background-color: var(--card-bg);
            border-radius: 16px;
            overflow: hidden;
            box-shadow: var(--shadow);
            border: 1px solid var(--border-color);
        }

        /* Barra lateral (Sidebar) */
        .sidebar {
            background-color: var(--card-bg);
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
        }

        .sidebar-header {
            padding: 24px;
            border-bottom: 1px solid var(--border-color);
        }

        .sidebar-header h1 {
            font-size: 1.25rem;
            color: var(--accent-color);
        }

        .sidebar-content {
            padding: 24px;
            color: var(--text-secondary);
            font-size: 0.9rem;
        }

        /* Sección principal de la aplicación */
        .main-workspace {
            display: flex;
            flex-direction: column;
            background-color: #f1f5f9;
        }

        .workspace-header {
            background-color: var(--card-bg);
            height: 72px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            padding: 0 32px;
        }

        .workspace-header h2 {
            font-size: 1.1rem;
            font-weight: 600;
        }

        /* CONTENEDOR DEL COMPONENTE DE CHAT */
        .chat-component-container {
            flex: 1;
            padding: 32px;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow-y: auto;
        }
        
        /* Responsive */
        @media (max-width: 768px) {
            .page-container {
                grid-template-columns: 1fr;
                height: auto;
            }
            .sidebar {
                display: none;
            }
        }
    </style>
</head>
<body>

    <div class="page-container">
        <!-- Barra lateral como diseño estético -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <h1>Developer Hub</h1>
            </div>
            <div class="sidebar-content">
                <p>Plantilla de espacio de trabajo para tu nuevo proyecto de mensajería en tiempo real.</p>
            </div>
        </aside>

        <!-- Área de la derecha que alberga tu chat -->
        <main class="main-workspace">
            <header class="workspace-header">
                <h2>Centro de Mensajes</h2>
            </header>
            
            <!-- Tu contenedor para el chat -->
            <div class="chat-component-container">
<app-root></app-root>
            </div>
        </main>
    </div>
</body>
</html>
